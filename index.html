<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hunter V2 | Fixed Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #e2e8f0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        /* DROPDOWN FIX */
        select { background-color: #0f172a !important; color: white !important; border: 1px solid rgba(255,255,255,0.1); }
        select option { background: #1e293b; color: white; padding: 12px; }
        .win { color: #22c55e; font-weight: 800; }
        .loss { color: #ef4444; font-weight: 800; }
        .info { color: #3b82f6; }
    </style>
</head>
<body class="p-3 md:p-8">

    <div class="max-w-4xl mx-auto space-y-4">
        
        <div class="glass p-5 rounded-[2rem] flex justify-between items-center border-b-2 border-blue-500/30">
            <div>
                <h1 class="text-2xl font-black italic tracking-tighter text-white">HUNTER <span class="text-blue-500 not-italic">V2</span></h1>
                <div class="flex items-center gap-2 mt-1">
                    <span id="dot" class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
                    <span id="statusText" class="text-[9px] uppercase font-black text-slate-500">Offline</span>
                </div>
            </div>
            <select id="activeAccount" onchange="loadSelectedAccount()" class="text-[10px] font-black p-3 rounded-xl outline-none min-w-[120px]">
                <option value="">SELECT ACCOUNT</option>
            </select>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <div class="glass p-4 rounded-3xl text-center">
                <p class="text-[8px] font-black text-slate-500 uppercase mb-1">Profit/Loss</p>
                <h2 id="statProfit" class="text-xl font-black mono text-white">$0.00</h2>
            </div>
            <div class="glass p-4 rounded-3xl text-center">
                <p class="text-[8px] font-black text-slate-500 uppercase mb-1">Balance</p>
                <h2 id="statBalance" class="text-xl font-black mono text-white truncate">$0.00</h2>
            </div>
            <div class="glass p-4 rounded-3xl text-center">
                <p class="text-[8px] font-black text-slate-500 uppercase mb-1">Streak</p>
                <h2 id="statStreak" class="text-xl font-black mono text-orange-500">0</h2>
            </div>
            <div class="glass p-4 rounded-3xl text-center">
                <p class="text-[8px] font-black text-slate-500 uppercase mb-1">Next Trade</p>
                <h2 id="statNextStake" class="text-xl font-black mono text-blue-400">$1.50</h2>
            </div>
        </div>

        <div class="glass p-6 rounded-[2rem] space-y-5">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label class="text-[9px] font-black text-slate-500 ml-1 uppercase">Market</label>
                    <select id="marketSelect" class="w-full p-4 rounded-2xl text-sm font-bold outline-none">
                        <option value="R_10">Volatility 10 Index</option>
                        <option value="R_25">Volatility 25 Index</option>
                        <option value="R_50">Volatility 50 Index</option>
                        <option value="R_100">Volatility 100 Index</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-slate-500 ml-1 uppercase">Stake</label>
                        <input type="number" id="stakeAwal" value="1.50" class="w-full p-4 bg-slate-900 border border-white/5 rounded-2xl text-white font-bold outline-none focus:ring-1 ring-blue-500">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-slate-500 ml-1 uppercase">Predict</label>
                        <input type="number" id="predDigit" value="5" class="w-full p-4 bg-slate-900 border border-white/5 rounded-2xl text-white font-bold outline-none focus:ring-1 ring-blue-500">
                    </div>
                </div>
            </div>

            <div class="flex flex-col md:flex-row gap-3">
                <button id="btnAction" onclick="toggleBot()" class="flex-[2] bg-blue-600 hover:bg-blue-500 text-white p-5 rounded-2xl font-black text-xs uppercase tracking-widest transition-all active:scale-95">Start Session</button>
                <button onclick="manualReset()" class="flex-1 bg-white/5 hover:bg-white/10 text-slate-400 p-5 rounded-2xl font-black text-[9px] uppercase tracking-widest transition-all">Reset Stake</button>
            </div>
        </div>

        <div class="glass rounded-[2rem] overflow-hidden flex flex-col h-60">
            <div class="px-6 py-3 bg-white/5 border-b border-white/5 text-[8px] font-black uppercase text-slate-500 tracking-widest flex justify-between">
                System Console <span id="logClock">--:--:--</span>
            </div>
            <div id="log" class="p-5 flex-1 overflow-y-auto font-mono text-[10px] space-y-1 scroll-smooth">
                <div class="text-slate-600">> Select a profile and hit Start.</div>
            </div>
        </div>
    </div>

    <script>
        const APP_ID = '1089';
        let ws, isRunning = false;
        let accounts = JSON.parse(localStorage.getItem('hunter_accounts') || '[]');
        let totalProfit = 0, lossCount = 0, currentStake = 0, accountBalance = 0;

        // Populate accounts
        const selAcc = document.getElementById('activeAccount');
        accounts.forEach((acc, i) => { selAcc.innerHTML += `<option value="${i}">${acc.name.toUpperCase()}</option>`; });

        function toggleBot() {
            if (isRunning) return stopBot();
            const idx = selAcc.value;
            if (!idx) return alert("Select an account first!");
            currentStake = parseFloat(document.getElementById('stakeAwal').value);
            connect(accounts[idx].token);
        }

        function connect(token) {
            ws = new WebSocket(`wss://ws.binaryws.com/websockets/v3?app_id=${APP_ID}`);
            
            ws.onopen = () => ws.send(JSON.stringify({ authorize: token }));

            ws.onmessage = (msg) => {
                const data = JSON.parse(msg.data);
                
                if (data.error) {
                    log(`Error: ${data.error.message}`, 'loss');
                    stopBot();
                    return;
                }

                switch (data.msg_type) {
                    case 'authorize':
                        log(`Authorized: ${data.authorize.loginid}`, 'info');
                        ws.send(JSON.stringify({ balance: 1, subscribe: 1 }));
                        isRunning = true;
                        updateStatus(true);
                        sendProposal();
                        break;
                    
                    case 'balance':
                        accountBalance = data.balance.balance;
                        updateUI();
                        break;

                    case 'proposal':
                        log(`Proposal OK. Executing $${currentStake.toFixed(2)}...`);
                        ws.send(JSON.stringify({ buy: data.proposal.id, price: currentStake }));
                        break;

                    case 'buy':
                        log(`Order Placed. Waiting for tick...`, 'info');
                        // Subscribe to the result
                        ws.send(JSON.stringify({ 
                            proposal_open_contract: 1, 
                            contract_id: data.buy.contract_id, 
                            subscribe: 1 
                        }));
                        break;

                    case 'proposal_open_contract':
                        const contract = data.proposal_open_contract;
                        if (contract.is_sold) {
                            // Immediately unsubscribe to prevent loop
                            ws.send(JSON.stringify({ forget: contract.subscription_id }));
                            processResult(contract);
                        }
                        break;
                }
            };
        }

        function sendProposal() {
            if (!isRunning) return;
            const market = document.getElementById('marketSelect').value;
            const pred = document.getElementById('predDigit').value;
            
            ws.send(JSON.stringify({
                proposal: 1,
                amount: parseFloat(currentStake.toFixed(2)),
                basis: 'stake',
                contract_type: 'DIGITDIFF',
                currency: 'USD',
                duration: 1,
                duration_unit: 't',
                symbol: market,
                barrier: pred.toString()
            }));
        }

        function processResult(c) {
            const p = parseFloat(c.profit);
            totalProfit += p;
            
            if (p > 0) {
                log(`WIN: +$${p.toFixed(2)}`, 'win');
                lossCount = 0;
                currentStake = parseFloat(document.getElementById('stakeAwal').value);
            } else {
                log(`LOSS: -$${Math.abs(p).toFixed(2)}`, 'loss');
                lossCount++;
                currentStake = currentStake * 11;
            }

            updateUI();
            // Wait 3.5 seconds before next trade to let market breathe
            setTimeout(sendProposal, 3500);
        }

        function stopBot() {
            isRunning = false;
            if(ws) ws.close();
            updateStatus(false);
            log("Session stopped by user.", 'info');
        }

        function manualReset() {
            currentStake = parseFloat(document.getElementById('stakeAwal').value);
            lossCount = 0;
            updateUI();
            log("Stake reset to base.", 'info');
        }

        function updateUI() {
            document.getElementById('statProfit').innerText = `$${totalProfit.toFixed(2)}`;
            document.getElementById('statProfit').className = `text-xl font-black mono ${totalProfit >= 0 ? 'text-green-400' : 'text-red-400'}`;
            document.getElementById('statBalance').innerText = `$${accountBalance.toLocaleString()}`;
            document.getElementById('statStreak').innerText = lossCount;
            document.getElementById('statNextStake').innerText = `$${currentStake.toFixed(2)}`;
        }

        function updateStatus(on) {
            document.getElementById('btnAction').innerText = on ? "STOP SESSION" : "START SESSION";
            document.getElementById('btnAction').className = on ? 
                document.getElementById('btnAction').className.replace('bg-blue-600', 'bg-red-600') : 
                document.getElementById('btnAction').className.replace('bg-red-600', 'bg-blue-600');
            document.getElementById('dot').className = `w-2 h-2 rounded-full ${on ? 'bg-green-500' : 'bg-red-500'} animate-pulse`;
            document.getElementById('statusText').innerText = on ? "Live Connection" : "Offline";
            document.getElementById('statusText').className = `text-[9px] uppercase font-black ${on ? 'text-green-500' : 'text-slate-500'}`;
        }

        function log(m, t) {
            const logBox = document.getElementById('log');
            const div = document.createElement('div');
            div.className = t || '';
            div.innerHTML = `<span class="opacity-30 mr-2">${new Date().toLocaleTimeString()}</span> ${m}`;
            logBox.prepend(div);
        }

        setInterval(() => { document.getElementById('logClock').innerText = new Date().toLocaleTimeString(); }, 1000);
    </script>
</body>
</html>
