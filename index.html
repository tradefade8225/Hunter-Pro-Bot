<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hunter V2 | Pro Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        
        /* Fixed Dropdown Colors */
        select { color-scheme: dark; }
        select option { background-color: #0f172a !important; color: white !important; padding: 10px; }
        
        /* Mobile scroll fix */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        @keyframes sweep { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        .loading-bar { position: relative; overflow: hidden; }
        .loading-bar::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.3), transparent); animation: sweep 2s infinite; }
    </style>
</head>
<body class="bg-[#020202] text-slate-300 min-h-screen">

    <div class="max-w-7xl mx-auto p-4 md:p-10 space-y-6">
        
        <div class="flex flex-col md:flex-row justify-between items-center gap-4 border-b border-white/5 pb-6">
            <div class="text-center md:text-left">
                <h1 class="text-3xl md:text-5xl font-black text-white tracking-tighter italic italic">HUNTER <span class="text-blue-500 not-italic">V2</span></h1>
                <p class="text-slate-500 font-bold text-[9px] tracking-[0.2em] uppercase">Mobile Optimized Terminal</p>
            </div>
            
            <div class="flex items-center gap-3 w-full md:w-auto">
                <div class="glass flex-1 md:flex-none px-4 py-2 rounded-xl flex items-center justify-between gap-4">
                    <select id="activeAccount" onchange="loadSelectedAccount()" class="bg-transparent text-xs font-bold text-white outline-none cursor-pointer min-w-[120px]">
                        <option value="">-- No Account --</option>
                    </select>
                    <button onclick="openAccountModal()" class="w-8 h-8 rounded-lg bg-blue-600/20 text-blue-400 flex items-center justify-center font-bold">+</button>
                </div>
                <div id="connBadge" class="px-4 py-3 rounded-xl bg-red-500/10 border border-red-500/20 text-red-500 text-[9px] font-black uppercase">OFF</div>
            </div>
        </div>

        <div class="grid grid-cols-12 gap-4 md:gap-8">
            
            <div class="col-span-12 lg:col-span-4 space-y-4">
                <div class="glass p-6 md:p-8 rounded-3xl space-y-5 border-t border-white/10">
                    <div class="flex justify-between items-center">
                        <h2 class="text-[10px] font-black uppercase text-blue-500">Config Panel</h2>
                        <button onclick="toggleSound()" id="soundBtn" class="text-[9px] font-bold text-slate-600 uppercase">🔊 ON</button>
                    </div>

                    <div class="grid grid-cols-1 gap-4">
                        <div class="space-y-1">
                            <label class="text-[9px] font-black uppercase text-slate-500 ml-1">Market</label>
                            <select id="marketSelect" class="w-full bg-slate-900 border border-white/10 rounded-xl p-4 text-sm font-bold text-white outline-none focus:ring-1 ring-blue-500">
                                <option value="1HZ10V">Volatility 10 (1s)</option>
                                <option value="1HZ25V">Volatility 25 (1s)</option>
                                <option value="1HZ50V">Volatility 50 (1s)</option>
                                <option value="1HZ100V">Volatility 100 (1s)</option>
                            </select>
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <div class="space-y-1">
                                <label class="text-[9px] font-black uppercase text-slate-500 ml-1">Base Stake</label>
                                <input type="number" id="stakeAwal" value="1.5" class="w-full bg-slate-900 border border-white/10 rounded-xl p-4 text-sm font-bold text-white outline-none">
                            </div>
                            <div class="space-y-1">
                                <label class="text-[9px] font-black uppercase text-slate-500 ml-1">Predict (0-9)</label>
                                <input type="number" id="predDigit" value="5" class="w-full bg-slate-900 border border-white/10 rounded-xl p-4 text-sm font-bold text-white outline-none">
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <div class="space-y-1">
                                <label class="text-[9px] font-black uppercase text-blue-500 ml-1">Multiplier</label>
                                <input type="number" id="martingaleX" value="11" step="0.5" class="w-full bg-slate-900 border border-white/10 rounded-xl p-4 text-sm font-bold text-blue-400 outline-none">
                            </div>
                            <div class="space-y-1">
                                <label class="text-[9px] font-black uppercase text-slate-500 ml-1">Ticks</label>
                                <input type="number" id="tickCount" value="1" min="1" max="10" class="w-full bg-slate-900 border border-white/10 rounded-xl p-4 text-sm font-bold text-white outline-none">
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <div class="p-3 bg-green-500/5 rounded-xl border border-green-500/10">
                                <label class="text-[8px] font-black uppercase text-green-500 block">Target Profit</label>
                                <input type="number" id="tp" value="10" class="bg-transparent text-lg font-black text-white outline-none w-full">
                            </div>
                            <div class="p-3 bg-red-500/5 rounded-xl border border-red-500/10">
                                <label class="text-[8px] font-black uppercase text-red-500 block">Stop Loss</label>
                                <input type="number" id="sl" value="500" class="bg-transparent text-lg font-black text-white outline-none w-full">
                            </div>
                        </div>
                    </div>

                    <div class="pt-2 space-y-3">
                        <button id="btnAction" onclick="toggleBot()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl shadow-lg transition-all active:scale-95 text-[11px] uppercase tracking-widest">Execute Strategy</button>
                        <button id="btnReset" onclick="manualReset()" class="w-full bg-white/5 text-slate-400 font-bold py-3 rounded-xl text-[9px] uppercase tracking-widest">Manual Stake Reset</button>
                    </div>
                </div>
            </div>

            <div class="col-span-12 lg:col-span-8 space-y-4">
                
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                    <div class="glass p-5 rounded-3xl border-b-2 border-blue-600">
                        <p class="text-[8px] font-black text-slate-500 uppercase mb-1">Session P/L</p>
                        <p id="statProfit" class="text-xl md:text-2xl font-black text-white mono">$0.00</p>
                    </div>
                    <div class="glass p-5 rounded-3xl">
                        <p class="text-[8px] font-black text-slate-500 uppercase mb-1">Balance</p>
                        <p id="statBalance" class="text-sm md:text-xl font-black text-white truncate mono">$0.00</p>
                    </div>
                    <div class="glass p-5 rounded-3xl">
                        <p class="text-[8px] font-black text-slate-500 uppercase mb-1">Loss Streak</p>
                        <p id="statStreak" class="text-xl md:text-2xl font-black text-orange-500 mono">0</p>
                    </div>
                    <div class="glass p-5 rounded-3xl">
                        <p class="text-[8px] font-black text-slate-500 uppercase mb-1">Next Trade</p>
                        <p id="statNextStake" class="text-sm md:text-xl font-black text-blue-400 mono">$1.50</p>
                    </div>
                </div>

                <div class="glass rounded-3xl overflow-hidden flex flex-col h-[280px] md:h-[350px]">
                    <div class="bg-white/5 p-3 px-5 border-b border-white/5 flex justify-between items-center">
                        <span class="text-[8px] font-black text-slate-400 uppercase tracking-widest">Live Logs</span>
                        <div id="loader" class="hidden w-16 h-1 bg-white/10 rounded-full loading-bar"></div>
                    </div>
                    <div id="log" class="p-5 flex-1 overflow-y-auto text-[10px] mono space-y-1">
                        <p class="text-slate-600">> Hardware acceleration active. Select account.</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="glass rounded-3xl overflow-hidden">
            <div class="p-5 border-b border-white/5 flex justify-between items-center bg-white/[0.02]">
                <h3 class="text-[10px] font-black uppercase tracking-widest text-slate-400">Execution History</h3>
            </div>
            <div class="overflow-x-auto no-scrollbar">
                <table class="w-full text-left min-w-[500px]">
                    <thead class="text-[8px] font-black text-slate-500 uppercase border-b border-white/5">
                        <tr>
                            <th class="p-5">Time</th>
                            <th class="p-5">Market</th>
                            <th class="p-5">Stake</th>
                            <th class="p-5">Result</th>
                            <th class="p-5 text-right">Profit</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody" class="text-[10px] font-bold divide-y divide-white/[0.02]"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="accountModal" class="fixed inset-0 bg-black/95 hidden items-center justify-center p-4 z-50">
        <div class="glass p-8 rounded-[2rem] w-full max-w-sm border border-white/10">
            <h3 class="text-xl font-black text-white mb-6 uppercase tracking-tight">Add Profile</h3>
            <div class="space-y-4">
                <input type="text" id="newAccName" placeholder="Profile Label" class="w-full bg-slate-900 border border-white/10 p-4 rounded-xl outline-none text-white font-bold">
                <input type="password" id="newAccToken" placeholder="Deriv API Token" class="w-full bg-slate-900 border border-white/10 p-4 rounded-xl outline-none text-white font-bold">
                <div class="flex gap-2 pt-4">
                    <button onclick="saveNewAccount()" class="flex-1 bg-blue-600 py-4 rounded-xl font-black text-white text-[10px] uppercase">Save</button>
                    <button onclick="closeAccountModal()" class="flex-1 bg-white/5 py-4 rounded-xl font-black text-slate-500 text-[10px] uppercase">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const APP_ID = '1089';
        let ws, isRunning = false, soundEnabled = true;
        let accounts = JSON.parse(localStorage.getItem('hunter_accounts') || '[]');
        let totalProfit = 0, lossCount = 0, currentStake = 0, accountBalance = 0;

        const winSound = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
        const lossSound = new Audio('https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg');

        window.onload = () => {
            renderAccountList();
            const last = localStorage.getItem('hunter_last_acc');
            if (last && accounts[last]) { document.getElementById('activeAccount').value = last; loadSelectedAccount(); }
        };

        function renderAccountList() {
            const select = document.getElementById('activeAccount');
            select.innerHTML = '<option value="">-- Profiles --</option>';
            accounts.forEach((acc, i) => { select.innerHTML += `<option value="${i}">${acc.name}</option>`; });
            if(accounts.length > 0) select.innerHTML += `<option value="CLEAR">Wipe All</option>`;
        }

        function loadSelectedAccount() {
            const v = document.getElementById('activeAccount').value;
            if(v === "CLEAR") { if(confirm("Delete accounts?")) { localStorage.clear(); location.reload(); } return; }
            if(v) { localStorage.setItem('hunter_last_acc', v); log(`Active Profile: ${accounts[v].name}`, 'info'); }
        }

        function manualReset() {
            currentStake = parseFloat(document.getElementById('stakeAwal').value);
            lossCount = 0;
            updateUI();
            log("Manual reset triggered.", 'info');
        }

        function toggleBot() {
            if (isRunning) return stopBot();
            const idx = document.getElementById('activeAccount').value;
            if (!idx || idx === "CLEAR") return alert("Select an account.");
            currentStake = parseFloat(document.getElementById('stakeAwal').value);
            initWebSocket(accounts[idx].token);
        }

        function initWebSocket(token) {
            ws = new WebSocket(`wss://ws.binaryws.com/websockets/v3?app_id=${APP_ID}`);
            ws.onopen = () => ws.send(JSON.stringify({ authorize: token }));
            ws.onmessage = (msg) => {
                const data = JSON.parse(msg.data);
                if (data.error) { log(`Error: ${data.error.message}`, 'loss'); stopBot(); return; }
                if (data.msg_type === 'authorize') { ws.send(JSON.stringify({ balance: 1, subscribe: 1 })); startBot(); }
                if (data.msg_type === 'balance') { accountBalance = parseFloat(data.balance.balance); updateUI(); }
                if (data.msg_type === 'proposal_open_contract' && data.proposal_open_contract.is_sold) processResult(data.proposal_open_contract);
            };
        }

        function startBot() {
            isRunning = true;
            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('btnAction').innerText = "Stop Session";
            document.getElementById('btnAction').classList.replace('bg-blue-600', 'bg-red-600');
            document.getElementById('connBadge').innerText = "Live";
            document.getElementById('connBadge').classList.replace('bg-red-500/10', 'bg-green-500/10');
            document.getElementById('connBadge').classList.replace('text-red-500', 'text-green-500');
            sendTrade();
        }

        function stopBot() {
            isRunning = false; if(ws) ws.close();
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('btnAction').innerText = "Execute Strategy";
            document.getElementById('btnAction').classList.replace('bg-red-600', 'bg-blue-600');
            document.getElementById('connBadge').innerText = "OFF";
            document.getElementById('connBadge').className = "px-4 py-3 rounded-xl bg-red-500/10 border border-red-500/20 text-red-500 text-[9px] font-black uppercase";
        }

        function sendTrade() {
            if (!isRunning) return;
            const pred = document.getElementById('predDigit').value;
            const market = document.getElementById('marketSelect').value;
            const ticks = parseInt(document.getElementById('tickCount').value);
            
            ws.send(JSON.stringify({
                "buy": 1, "price": parseFloat(currentStake.toFixed(2)),
                "parameters": { 
                    "amount": parseFloat(currentStake.toFixed(2)), 
                    "basis": "stake", 
                    "contract_type": "DIGITDIFF", 
                    "currency": "USD", 
                    "duration": ticks, 
                    "duration_unit": "t", 
                    "symbol": market, 
                    "barrier": pred.toString() 
                }
            }));
            log(`${market} @ $${currentStake.toFixed(2)}`);
        }

        function processResult(c) {
            const profit = parseFloat(c.profit);
            const mX = parseFloat(document.getElementById('martingaleX').value);
            totalProfit += profit;
            
            if (profit > 0) {
                lossCount = 0;
                currentStake = parseFloat(document.getElementById('stakeAwal').value);
                if(soundEnabled) winSound.play();
                log(`Win +$${profit.toFixed(2)}`, 'win');
            } else {
                lossCount++;
                currentStake = currentStake * mX;
                if(soundEnabled) lossSound.play();
                log(`Loss Step ${lossCount}`, 'loss');
            }

            updateUI();
            addHistoryRow(c);
            if (totalProfit >= parseFloat(document.getElementById('tp').value) || totalProfit <= (parseFloat(document.getElementById('sl').value) * -1)) stopBot();
            else setTimeout(sendTrade, 3500);
        }

        function updateUI() {
            const p = document.getElementById('statProfit');
            p.innerText = `${totalProfit >= 0 ? '+' : ''}$${totalProfit.toFixed(2)}`;
            p.className = `text-xl md:text-2xl font-black mono ${totalProfit >= 0 ? 'text-green-400' : 'text-red-400'}`;
            document.getElementById('statStreak').innerText = lossCount;
            document.getElementById('statNextStake').innerText = `$${currentStake.toFixed(2)}`;
            document.getElementById('statBalance').innerText = `$${accountBalance.toLocaleString()}`;
        }

        function addHistoryRow(c) {
            const tbody = document.getElementById('historyBody');
            const profit = parseFloat(c.profit);
            const row = document.createElement('tr');
            row.innerHTML = `
                <td class="p-5 text-slate-600 font-mono">${new Date().toLocaleTimeString()}</td>
                <td class="p-5 text-white font-black">${c.display_name.split(' ')[1]}</td>
                <td class="p-5 text-slate-400">$${parseFloat(c.buy_price).toFixed(2)}</td>
                <td class="p-5 uppercase text-[8px] font-black ${profit > 0 ? 'text-green-500' : 'text-red-500'}">${profit > 0 ? 'Win' : 'Loss'}</td>
                <td class="p-5 text-right font-black ${profit > 0 ? 'text-green-400' : 'text-red-400'}">${profit > 0 ? '+' : ''}$${profit.toFixed(2)}</td>
            `;
            tbody.prepend(row);
            if(tbody.children.length > 20) tbody.lastChild.remove();
        }

        function openAccountModal() { document.getElementById('accountModal').classList.replace('hidden', 'flex'); }
        function closeAccountModal() { document.getElementById('accountModal').classList.replace('flex', 'hidden'); }
        function saveNewAccount() {
            const n = document.getElementById('newAccName').value, t = document.getElementById('newAccToken').value;
            if(!n || !t) return;
            accounts.push({ name: n, token: t });
            localStorage.setItem('hunter_accounts', JSON.stringify(accounts));
            renderAccountList(); closeAccountModal();
        }
        function toggleSound() { soundEnabled = !soundEnabled; document.getElementById('soundBtn').innerText = soundEnabled ? "🔊 ON" : "🔇 OFF"; }
        function log(m, t) {
            const logBox = document.getElementById('log');
            const div = document.createElement('div');
            div.className = `${t === 'win' ? 'text-green-400' : t === 'loss' ? 'text-red-400 font-bold' : t === 'info' ? 'text-blue-400' : ''}`;
            div.innerHTML = `<span class="opacity-20 mr-1">[${new Date().toLocaleTimeString()}]</span> ${m}`;
            logBox.prepend(div);
            if(logBox.children.length > 20) logBox.lastChild.remove();
        }
    </script>
</body>
</html>
